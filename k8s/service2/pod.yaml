# Step 4a: bare Pod (learning only — use Deployment in practice)
apiVersion: v1
kind: Pod
metadata:
  name: products-pod
  namespace: microservices
  labels:
    app: products-service
spec:
  containers:
    - name: products
      image: service2:local
      imagePullPolicy: Never
      ports:
        - containerPort: 80
      envFrom:
        - configMapRef:
            name: products-service-config
        - secretRef:
            name: products-service-secrets
      volumeMounts:
        - name: storage
          mountPath: /rails/storage
  securityContext:
    fsGroup: 1000
  volumes:
    - name: storage
      persistentVolumeClaim:
        claimName: products-service-data
